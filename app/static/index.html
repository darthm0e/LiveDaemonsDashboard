<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0d1117" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<title>LDD – Live Daemons Dashboard</title>
<style>
  :root {
    --bg:        #0d1117;
    --bg-grid:   #11161d;
    --panel:     #161b22;
    --panel-up:  #141c17;
    --panel-down:#1f1417;
    --border:    #232a33;
    --border-hi: #303a45;
    --text:      #e6edf3;
    --muted:     #8b97a5;
    --faint:     #5b6571;
    --accent:    #ffd400;   /* Ops-Gelb: nur Akzent, nie Status */
    --up:        #3fb950;
    --down:      #ff4d5e;
    --warn:      #e3b341;
    --mono: ui-monospace, "JetBrains Mono", "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
    --ui: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, #141b24 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--ui);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 64px; }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .beacon-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--up); box-shadow: 0 0 0 4px color-mix(in srgb, var(--up) 18%, transparent);
    flex: 0 0 auto;
  }
  .brand h1 {
    margin: 0; font-size: 19px; font-weight: 650; letter-spacing: .2px;
  }
  .brand .sub {
    font-family: var(--mono); font-size: 11px; color: var(--faint);
    letter-spacing: .5px; text-transform: uppercase; margin-top: 2px;
  }
  .meta { display: flex; align-items: center; gap: 18px; }
  .clock { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: right; }
  .clock b { color: var(--text); font-weight: 600; }
  .refresh {
    appearance: none; border: 1px solid var(--border-hi); background: var(--panel);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 7px 12px; border-radius: 7px; cursor: pointer; display: flex;
    align-items: center; gap: 7px; transition: border-color .15s, background .15s;
  }
  .refresh:hover { border-color: var(--accent); }
  .refresh:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .refresh svg { width: 13px; height: 13px; }
  button { -webkit-tap-highlight-color: transparent; }
  .spin { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- System-Vitaldaten (oben) ---------- */
  .system {
    margin: 18px 0 0; padding: 14px 20px;
    background: linear-gradient(180deg, #11171f, var(--panel));
    border: 1px solid var(--border); border-radius: 12px;
    display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
  }
  .system.err { border-color: color-mix(in srgb, var(--warn) 45%, var(--border)); }
  .system .host {
    display: flex; align-items: center; gap: 11px;
    padding-right: 24px; border-right: 1px solid var(--border);
  }
  .host .hdot { width: 9px; height: 9px; border-radius: 50%; background: var(--up);
                box-shadow: 0 0 8px color-mix(in srgb, var(--up) 70%, transparent); }
  .host .hname { font-size: 15px; font-weight: 650; letter-spacing: .2px; }
  .host .hsub { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.5px;
                text-transform: uppercase; color: var(--faint); margin-top: 1px; }
  .stat { display: flex; flex-direction: column; gap: 5px; min-width: 86px; }
  .stat .slabel { font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
  .stat .sval { font-family: var(--mono); font-size: 19px; font-weight: 650;
                font-variant-numeric: tabular-nums; line-height: 1; color: var(--text); }
  .stat .sval small { font-size: 11px; font-weight: 500; color: var(--muted); margin-left: 1px; }
  .stat .sval.v-warn { color: var(--warn); }
  .stat .sval.v-crit { color: var(--down); }
  .stat .sdetail { font-family: var(--mono); font-size: 10px; color: var(--faint); }
  .gauge { height: 4px; width: 82px; border-radius: 3px; background: var(--border-hi); overflow: hidden; }
  .gauge > i { display: block; height: 100%; border-radius: 3px; transition: width .4s ease; }
  .gauge.g-ok > i   { background: var(--up); }
  .gauge.g-warn > i { background: var(--warn); }
  .gauge.g-crit > i { background: var(--down); }
  .system .serr { font-family: var(--mono); font-size: 12px; color: var(--warn); }

  /* ---------- Signature: LED-Statusleiste ---------- */
  .beacon {
    margin: 22px 0 30px; padding: 18px 20px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; display: flex; align-items: center;
    gap: 22px; flex-wrap: wrap;
    transition: border-color .3s, background .3s;
  }
  .beacon.alarm {
    border-color: color-mix(in srgb, var(--down) 55%, var(--border));
    background: linear-gradient(180deg, var(--panel-down), var(--panel));
  }
  .beacon-state { display: flex; flex-direction: column; gap: 4px; min-width: 220px; }
  .beacon-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--faint);
  }
  .beacon-headline {
    font-size: 26px; font-weight: 700; letter-spacing: -.3px; line-height: 1.1;
  }
  .beacon.ok    .beacon-headline { color: var(--up); }
  .beacon.alarm .beacon-headline { color: var(--down); }
  .beacon-names {
    font-family: var(--mono); font-size: 12px; color: var(--down);
    margin-top: 2px; word-break: break-word;
  }

  .leds { display: flex; gap: 3px; flex: 1 1 320px; min-width: 220px; flex-wrap: wrap; }
  .led { width: 14px; height: 22px; border-radius: 2px; background: var(--border-hi); opacity: .55; }
  .led.up   { background: var(--up);   opacity: 1; box-shadow: 0 0 6px color-mix(in srgb, var(--up) 60%, transparent); }
  .led.down { background: var(--down); opacity: 1; box-shadow: 0 0 7px color-mix(in srgb, var(--down) 75%, transparent); }

  .counts { display: flex; gap: 20px; font-family: var(--mono); }
  .count .n { font-size: 22px; font-weight: 700; line-height: 1; }
  .count .l { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
  .count.up .n   { color: var(--up); }
  .count.down .n { color: var(--down); }

  /* ---------- Sektionen ---------- */
  section { margin-top: 30px; }
  .sec-head {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .sec-head h2 {
    margin: 0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); font-weight: 650;
  }
  .sec-head .tally { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .sec-note { font-family: var(--mono); font-size: 12px; color: var(--warn); }

  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
  }

  /* ---------- Kachel ---------- */
  .card {
    position: relative; background: var(--panel);
    border: 1px solid var(--border); border-left: 3px solid var(--border-hi);
    border-radius: 9px; padding: 13px 14px; overflow: hidden;
    transition: border-color .15s;
  }
  .card.up   { border-left-color: var(--up);   background: linear-gradient(110deg, var(--panel-up) 0%, var(--panel) 35%); }
  .card.down { border-left-color: var(--down); background: linear-gradient(110deg, var(--panel-down) 0%, var(--panel) 35%); }
  .card.warn { border-left-color: var(--warn); }
  .card.crit-down { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--down) 35%, transparent); }

  .card-top { display: flex; align-items: center; gap: 9px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; background: var(--faint); }
  .up   .dot { background: var(--up); }
  .down .dot { background: var(--down); }
  .warn .dot { background: var(--warn); }
  .down .dot { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--down) 60%, transparent); }
    50%     { box-shadow: 0 0 0 5px color-mix(in srgb, var(--down) 0%, transparent); }
  }

  .name { font-size: 14px; font-weight: 600; flex: 1 1 auto; min-width: 0;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .8px; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border-hi); border-radius: 5px;
    padding: 2px 6px; flex: 0 0 auto;
  }
  .crit-flag {
    font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
    color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--border));
    border-radius: 5px; padding: 2px 5px; flex: 0 0 auto;
  }
  .card-bottom {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-top: 9px;
  }
  .target { font-family: var(--mono); font-size: 11.5px; color: var(--muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta-line {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    margin-top: 7px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .meta-line .up-t { color: var(--up); }
  .down .meta-line .up-t { color: var(--muted); }
  .meta-line .port {
    border: 1px solid var(--border-hi); border-radius: 4px; padding: 1px 5px;
    color: var(--text); white-space: nowrap;
  }
  .detail { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .metric { font-family: var(--mono); font-size: 12px; color: var(--text);
            font-variant-numeric: tabular-nums; flex: 0 0 auto; }
  .down .metric { color: var(--down); }

  /* ---------- Zustände ---------- */
  .banner {
    margin: 16px 0; padding: 12px 16px; border-radius: 9px; font-family: var(--mono);
    font-size: 13px; border: 1px solid var(--border-hi); background: var(--panel); color: var(--muted);
  }
  .banner.err { border-color: color-mix(in srgb, var(--down) 50%, var(--border)); color: var(--down); }
  .empty { color: var(--faint); font-family: var(--mono); font-size: 12px; padding: 4px 0; }

  @media (max-width: 560px) {
    .wrap {
      padding: 16px max(14px, env(safe-area-inset-right)) 48px max(14px, env(safe-area-inset-left));
    }
    header { padding-bottom: 16px; }
    .brand h1 { font-size: 17px; }
    .beacon { padding: 15px 16px; gap: 16px; }
    .beacon-headline { font-size: 21px; }
    .beacon-state { min-width: 160px; }
    .meta { width: 100%; justify-content: space-between; }
    .refresh { padding: 9px 12px; }
    .system { padding: 13px 15px; gap: 18px 22px; }
    .system .host { padding-right: 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .counts { gap: 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .down .dot, .spin { animation: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="beacon-dot" id="brandDot"></span>
      <div>
        <h1 id="title">LDD</h1>
        <div class="sub">Live Daemons Dashboard</div>
      </div>
    </div>
    <div class="meta">
      <div class="clock">
        <div>Letzte Prüfung <b id="lastCheck">–</b></div>
        <div id="countdown">nächste in –</div>
      </div>
      <button class="refresh" id="refreshBtn" title="Jetzt prüfen">
        <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
        Prüfen
      </button>
    </div>
  </header>

  <div id="system"></div>

  <div id="configError"></div>

  <div class="beacon ok" id="beacon">
    <div class="beacon-state">
      <span class="beacon-label">Systemzustand</span>
      <span class="beacon-headline" id="beaconHeadline">Initialisiere…</span>
      <span class="beacon-names" id="beaconNames"></span>
    </div>
    <div class="leds" id="leds"></div>
    <div class="counts">
      <div class="count up"><div class="n" id="cUp">–</div><div class="l">Up</div></div>
      <div class="count down"><div class="n" id="cDown">–</div><div class="l">Down</div></div>
      <div class="count"><div class="n" id="cTotal">–</div><div class="l">Gesamt</div></div>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let interval = 30, remaining = 30, timer = null, busy = false;

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString("de-DE");
}
function fmtUptime(s) {
  if (s == null) return null;
  const d = Math.floor(s / 86400),
        h = Math.floor((s % 86400) / 3600),
        m = Math.floor((s % 3600) / 60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m`;
  return `${s}s`;
}

// ---- Kachel-Rendering ----
function checkCard(c) {
  const cls = c.ok ? "up" : "down";
  const crit = c.critical ? `<span class="crit-flag">KRIT</span>` : "";
  const critDown = (!c.ok && c.critical) ? "crit-down" : "";
  const metric = c.ok && c.latency_ms != null ? `${c.latency_ms} ms` : (c.ok ? "ok" : "down");
  return `
    <div class="card ${cls} ${critDown}">
      <div class="card-top">
        <span class="dot"></span>
        <span class="name" title="${esc(c.name)}">${esc(c.name)}</span>
        ${crit}<span class="badge">${esc(c.type)}</span>
      </div>
      <div class="card-bottom">
        <span class="target" title="${esc(c.target)}">${esc(c.host || c.target || "")}</span>
        <span class="metric">${esc(metric)}</span>
      </div>
      <div class="detail">${esc(c.detail || "")}</div>
    </div>`;
}

function dockerCard(c) {
  const cls = c.ok ? "up" : (c.status === "running" ? "warn" : "down");
  const crit = c.critical ? `<span class="crit-flag">KRIT</span>` : "";
  const critDown = (!c.ok && c.critical) ? "crit-down" : "";
  let state = c.status;
  if (c.health) state += ` · ${c.health}`;

  const uptime = fmtUptime(c.uptime_seconds);
  const ports = c.ports || [];
  const meta = [];
  if (uptime) meta.push(`<span class="up-t">▲ ${esc(uptime)}</span>`);
  ports.forEach(p => meta.push(`<span class="port">${esc(p)}</span>`));
  const metaLine = meta.length ? `<div class="meta-line">${meta.join("")}</div>` : "";

  return `
    <div class="card ${cls} ${critDown}">
      <div class="card-top">
        <span class="dot"></span>
        <span class="name" title="${esc(c.image)}">${esc(c.name)}</span>
        ${crit}<span class="badge">docker</span>
      </div>
      <div class="card-bottom">
        <span class="target">${esc(c.ip || "—")}</span>
        <span class="metric">${esc(state)}</span>
      </div>
      ${metaLine}
      <div class="detail" title="${esc(c.image)}">${esc(c.image || "")}</div>
    </div>`;
}

function section(title, tally, inner, note) {
  return `
    <section>
      <div class="sec-head">
        <h2>${esc(title)}</h2>
        <span class="tally">${tally}</span>
        ${note ? `<span class="sec-note">${esc(note)}</span>` : ""}
      </div>
      ${inner}
    </section>`;
}

function renderLeds(items) {
  // bis zu 60 Segmente, danach reicht die Zählung darunter
  const max = 60;
  const slice = items.slice(0, max);
  return slice.map(ok => `<span class="led ${ok ? "up" : "down"}"></span>`).join("");
}

function gaugeClass(v) { return v >= 90 ? "crit" : (v >= 70 ? "warn" : "ok"); }
function tempClass(v)  { return v >= 75 ? "crit" : (v >= 60 ? "warn" : "ok"); }

function renderSystem(sys) {
  const el = $("system");
  if (!sys || !sys.enabled) { el.innerHTML = ""; return; }

  if (!sys.ok) {
    el.innerHTML = `<div class="system err">
      <div class="host"><span class="hdot" style="background:var(--warn);box-shadow:none"></span>
      <div><div class="hname">${esc(sys.name || "System")}</div>
      <div class="hsub">Vitaldaten</div></div></div>
      <div class="serr">nicht verfügbar — ${esc(sys.error || "")}</div></div>`;
    return;
  }

  const cells = (sys.metrics || []).map(m => {
    if (m.value == null) return "";
    if (m.kind === "percent") {
      const g = gaugeClass(m.value);
      return `<div class="stat">
        <span class="slabel">${esc(m.label)}</span>
        <span class="sval v-${g}">${esc(m.value)}<small>%</small></span>
        <span class="gauge g-${g}"><i style="width:${Math.min(100, m.value)}%"></i></span>
        ${m.detail ? `<span class="sdetail">${esc(m.detail)}</span>` : ""}
      </div>`;
    }
    if (m.kind === "temp") {
      const g = m.status || tempClass(m.value);
      return `<div class="stat">
        <span class="slabel">${esc(m.label)}</span>
        <span class="sval v-${g}">${esc(m.value)}<small>${esc(m.unit || "°C")}</small></span>
        ${m.detail ? `<span class="sdetail">${esc(m.detail)}</span>` : ""}
      </div>`;
    }
    return `<div class="stat">
      <span class="slabel">${esc(m.label)}</span>
      <span class="sval">${esc(m.value)}</span>
    </div>`;
  }).join("");

  el.innerHTML = `<div class="system">
    <div class="host">
      <span class="hdot"></span>
      <div><div class="hname">${esc(sys.name || "System")}</div>
      <div class="hsub">Vitaldaten</div></div>
    </div>
    ${cells}
  </div>`;
}

function render(data) {
  renderSystem(data.system);
  const s = data.summary;
  const allStates = [];
  data.docker.containers.forEach(c => allStates.push(c.ok));
  data.groups.forEach(g => g.checks.forEach(c => allStates.push(c.ok)));

  // Beacon
  const beacon = $("beacon"), dot = $("brandDot");
  const alarm = s.critical_down.length > 0;
  const anyDown = s.down > 0;
  beacon.className = "beacon " + (alarm ? "alarm" : "ok");
  if (alarm) {
    const n = s.critical_down.length;
    $("beaconHeadline").textContent = `${n} ${n === 1 ? "kritischer Alarm" : "kritische Alarme"}`;
    $("beaconNames").textContent = "▸ " + s.critical_down.join("  ▸ ");
    dot.style.background = "var(--down)";
    dot.style.boxShadow = "0 0 0 4px color-mix(in srgb, var(--down) 20%, transparent)";
  } else if (anyDown) {
    beacon.className = "beacon ok";
    $("beaconHeadline").textContent = "Stabil, mit Ausfällen";
    $("beaconHeadline").style.color = "var(--warn)";
    $("beaconNames").textContent = `${s.down} nicht-kritische Dienste offline`;
    dot.style.background = "var(--warn)";
    dot.style.boxShadow = "0 0 0 4px color-mix(in srgb, var(--warn) 20%, transparent)";
  } else {
    $("beaconHeadline").style.color = "";
    $("beaconHeadline").textContent = "Alles stabil";
    $("beaconNames").textContent = "";
    dot.style.background = "var(--up)";
    dot.style.boxShadow = "0 0 0 4px color-mix(in srgb, var(--up) 18%, transparent)";
  }
  $("leds").innerHTML = renderLeds(allStates);
  $("cUp").textContent = s.up;
  $("cDown").textContent = s.down;
  $("cTotal").textContent = s.total;

  // Inhalt
  let html = "";
  const d = data.docker;
  if (d.enabled) {
    if (d.error) {
      html += section("Docker-Container", "", "",
        "Socket nicht erreichbar – " + d.error);
    } else if (d.containers.length) {
      const up = d.containers.filter(c => c.ok).length;
      html += section("Docker-Container", `${up}/${d.containers.length} ok`,
        `<div class="grid">${d.containers.map(dockerCard).join("")}</div>`);
    } else {
      html += section("Docker-Container", "0",
        `<div class="empty">Keine Container gefunden.</div>`);
    }
  }
  data.groups.forEach(g => {
    const up = g.checks.filter(c => c.ok).length;
    const inner = g.checks.length
      ? `<div class="grid">${g.checks.map(checkCard).join("")}</div>`
      : `<div class="empty">Keine Checks konfiguriert.</div>`;
    html += section(g.name, `${up}/${g.checks.length} ok`, inner);
  });

  $("content").innerHTML = html;
  $("lastCheck").textContent = fmtTime(data.generated_at);
}

// ---- Daten laden ----
async function load() {
  if (busy) return;
  busy = true;
  $("refreshIcon").classList.add("spin");
  try {
    const res = await fetch("api/status", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    render(await res.json());
    $("configError").innerHTML = "";
  } catch (e) {
    $("configError").innerHTML =
      `<div class="banner err">Dashboard-Backend nicht erreichbar (${esc(e.message)}). Nächster Versuch läuft…</div>`;
  } finally {
    busy = false;
    $("refreshIcon").classList.remove("spin");
    remaining = interval;
  }
}

function tick() {
  remaining -= 1;
  if (remaining <= 0) { load(); remaining = interval; }
  $("countdown").textContent = `nächste in ${Math.max(0, remaining)}s`;
}

async function init() {
  try {
    const cfg = await (await fetch("api/config", { cache: "no-store" })).json();
    document.title = cfg.title;
    $("title").textContent = cfg.title;
    interval = cfg.refresh_interval || 30;
    remaining = interval;
    if (cfg.config_error) {
      $("configError").innerHTML = `<div class="banner err">${esc(cfg.config_error)}</div>`;
    }
  } catch (_) { /* Defaults behalten */ }
  await load();
  timer = setInterval(tick, 1000);
}

$("refreshBtn").addEventListener("click", () => { load(); remaining = interval; });

// --- Alt-PWA aufräumen: früher registrierten Service-Worker + Caches entfernen,
//     damit Anfragen wieder direkt an den Server gehen (u.a. für den Login nötig).
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then((regs) => regs.forEach((r) => r.unregister()))
    .catch(() => {});
}
if (window.caches && caches.keys) {
  caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
}

init();
</script>
</body>
</html>
